name: Deploy VPS DEV

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH (DEV)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/nolevel-app-dev || mkdir -p /var/www/nolevel-app-dev

            cd /var/www/nolevel-app-dev

            if [ ! -d ".git" ]; then
              git clone https://github.com/oscarRodriguesDev/NolevelBOT.git .
              git checkout dev
            else
              git fetch origin
              git reset --hard origin/dev
            fi

            docker compose down
            docker compose up -d --build