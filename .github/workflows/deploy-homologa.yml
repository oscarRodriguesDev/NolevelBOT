name: Deploy VPS DEV

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Deploy via SSH (DEV)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            mkdir -p /var/www/dev/nolevel-app-dev
            cd /var/www/dev/nolevel-app-dev

            if [ ! -d ".git" ]; then
              git clone -b dev https://github.com/oscarRodriguesDev/NolevelBOT.git .
            else
              git fetch origin
              git reset --hard origin/dev
              git clean -fd
            fi

            if [ ! -f ".env" ]; then
              cp .env.dev .env || echo "sem .env.dev encontrado"
            fi

            docker compose -p nolevel-dev down
            docker compose -p nolevel-dev up -d --build