name: Deploy VPS DEV

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH (DEV)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            mkdir -p /var/www/nolevel-app-dev
            cd /var/www/nolevel-app-dev

            if [ ! -d ".git" ]; then
              git clone -b dev https://github.com/oscarRodriguesDev/NolevelBOT.git .
            else
              git fetch origin
              git reset --hard origin/dev
              git clean -fd
            fi

            if [ ! -f ".env" ]; then
              cp .env.dev .env || echo "sem .env.dev encontrado"
            fi

            docker compose down
            docker compose up -d --build